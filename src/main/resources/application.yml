spring:
  application:
    name: hackathon

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

fastapi:
  base-url: ${FASTAPI_BASE_URL}

cors:
  front:
    host: ${FRONT_BASE_URL}
  back:
    host: ${BACK_BASE_URL}
