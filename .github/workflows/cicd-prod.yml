name: KTB 해커톤 ZEUSAI CICD 파이프라인

# 어떤 브랜치에서 쓰이는 지
on:
  push:
    branches:
      - develop

# CICD JOBS
jobs:

  # 테스트가 없기에 바로 도커 이미지 빌드 + 푸시하기
  build-push-image:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ktb-be:latest
            ${{ secrets.DOCKER_USERNAME }}/ktb-be:${{ github.sha }}

  deploy :
    runs-on: ubuntu-22.04
    needs: build-push-image
    if: success()
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: env 생성
        run: echo "${{ secrets.ENV }}" > .env

      - name: .env 파일 EC2에 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: ".env"  # 방금 생성한 .env 파일
          target: "/home/ubuntu/app/"

      - name: docker-compose.yml 전달
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/app/"

      - name: EC2에서 docker-compose 실행
        uses: appleboy/ssh-action@master  # SSH를 사용하여 EC2에서 명령 실행
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}  # EC2 퍼블릭 IP
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # docker-compose 명령어 실행
            cd /home/ubuntu/app/
            docker compose pull
            docker compose up -d spring
            docker compose ps


  notify-discord:
      runs-on: ubuntu-22.04
      needs: deploy
      if: always()
      steps:
        - name: Discord 배포 요청 알림
          uses: sarisia/actions-status-discord@v1
          with:
            webhook: ${{ secrets.DISCORD_WEBHOOK_BACK_URL }}
            title: "${{ needs.deploy.result == 'success' && '✅' || '❌' }} 백엔드 develop 브랜치 배포 결과"
            description: |
              **커밋 메시지**: ${{ github.event.head_commit.message }}
              **작성자**: ${{ github.event.pusher.name }}
              **브랜치**: `${{ github.ref_name }}`
  
              **📊 빌드/배포 결과**:
              - 상태: ${{ needs.deploy.result == 'success' && '성공' || '실패' }}
  
              **🔗 링크**:
              - [커밋 확인하기](${{ github.event.head_commit.url }})

            color: "${{ needs.deploy.result == 'success' && 65280 || 16711680 }}"
            username: GitHub Deploy Bot
            avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
